services:
  # Backend API + WebSocket server
  - type: web
    name: planning-poker-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      npm install -g pnpm@9 &&
      pnpm install --prod=false &&
      pnpm --filter @planning-poker/shared build &&
      pnpm --filter @planning-poker/server exec prisma generate &&
      pnpm --filter @planning-poker/server build &&
      pnpm --filter @planning-poker/server exec prisma db push
    startCommand: pnpm --filter @planning-poker/server exec tsx src/index.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Configurar manualmente con el connection string de Neon
      - key: CLIENT_URL
        sync: false

  # Frontend Static Site
  - type: web
    name: planning-poker-frontend
    runtime: static
    buildCommand: |
      npm install -g pnpm@9 &&
      pnpm install --prod=false &&
      pnpm --filter @planning-poker/shared build &&
      pnpm --filter @planning-poker/client build
    staticPublishPath: packages/client/dist
    envVars:
      - key: VITE_SERVER_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
