services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    image: planning-poker-server
    container_name: planning-poker-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      CLIENT_URL: ${CLIENT_URL}
